<!-- Vista: Gestión de usuarios (director-users.html) -->
<link rel="stylesheet" href="public/assets/styles/director/director-users.css">

<div class="view-header">
    <div>
        <h2>👥 Gestión de usuarios</h2>
        <p class="text-help">Administra los docentes de tu institución y asigna sus niveles y departamentos.</p>
    </div>
    <button class="btn btn-primary" id="addUserBtn">
        <i class="ri-add-line"></i> Nuevo docente
    </button>
</div>

<!-- Estadísticas con iconos -->
<div class="user-stats-grid">
    <div class="stat-card users-total">
        <div class="stat-icon"><i class="ri-user-line"></i></div>
        <div class="stat-info">
            <span class="stat-number" id="totalUsers">0</span>
            <span class="stat-label">Total docentes</span>
        </div>
    </div>
    <div class="stat-card users-active">
        <div class="stat-icon"><i class="ri-user-follow-line"></i></div>
        <div class="stat-info">
            <span class="stat-number" id="activeUsers">0</span>
            <span class="stat-label">Activos</span>
        </div>
    </div>
    <div class="stat-card users-inactive">
        <div class="stat-icon"><i class="ri-user-unfollow-line"></i></div>
        <div class="stat-info">
            <span class="stat-number" id="inactiveUsers">0</span>
            <span class="stat-label">Inactivos</span>
        </div>
    </div>
</div>

<!-- Filtros con chips -->
<div class="filters-bar user-filters">
    <div class="search-wrapper">
        <i class="ri-search-line"></i>
        <input type="text" id="searchUser" placeholder="Buscar por nombre o correo..." class="search-input">
    </div>
    <div class="filter-chips" id="statusFilters">
        <button class="chip active" data-status="all">
            <i class="ri-apps-line"></i> Todos
        </button>
        <button class="chip chip-active" data-status="active">
            <i class="ri-check-line"></i> Activos
        </button>
        <button class="chip chip-inactive" data-status="inactive">
            <i class="ri-close-line"></i> Inactivos
        </button>
    </div>
</div>

<!-- Grid de usuarios -->
<div id="usersGrid" class="card-grid">
    <!-- Los usuarios se cargarán dinámicamente aquí -->
</div>

<!-- ===== MODALES (sin cambios) ===== -->

<!-- Modal: Crear usuario -->
<div class="modal-overlay" id="createUserModal" style="display:none;">
    <div class="modal-container">
        <div class="modal-header">
            <h3>📝 Nuevo docente</h3>
            <button class="modal-close" id="closeCreateUserModal">&times;</button>
        </div>
        <div class="modal-body">
            <form id="createUserForm">
                <div class="form-group">
                    <label for="newUserName">Nombre completo <span class="required">*</span></label>
                    <input type="text" id="newUserName" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label for="newUserEmail">Correo electrónico <span class="required">*</span></label>
                    <input type="email" id="newUserEmail" placeholder="juan@colegio.edu" required>
                </div>
                <div class="form-group">
                    <label for="newUserLevel">Nivel educativo</label>
                    <select id="newUserLevel">
                        <option value="Inicial">Inicial</option>
                        <option value="Primaria">Primaria</option>
                        <option value="Secundaria" selected>Secundaria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newUserDept">Departamento</label>
                    <select id="newUserDept">
                        <option value="">Sin asignar</option>
                        <option value="Matemáticas">Matemáticas</option>
                        <option value="Comunicación">Comunicación</option>
                        <option value="Ciencias">Ciencias</option>
                        <option value="Historia">Historia</option>
                        <option value="Arte">Arte</option>
                        <option value="Educación Física">Educación Física</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelCreateUser">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear docente</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Editar usuario -->
<div class="modal-overlay" id="editUserModal" style="display:none;">
    <div class="modal-container">
        <div class="modal-header">
            <h3>✏️ Editar docente</h3>
            <button class="modal-close" id="closeEditUserModal">&times;</button>
        </div>
        <div class="modal-body">
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="editUserName">Nombre completo</label>
                    <input type="text" id="editUserName" required>
                </div>
                <div class="form-group">
                    <label for="editUserEmail">Correo electrónico</label>
                    <input type="email" id="editUserEmail" required>
                </div>
                <div class="form-group">
                    <label for="editUserLevel">Nivel educativo</label>
                    <select id="editUserLevel">
                        <option value="Inicial">Inicial</option>
                        <option value="Primaria">Primaria</option>
                        <option value="Secundaria">Secundaria</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editUserDept">Departamento</label>
                    <select id="editUserDept">
                        <option value="">Sin asignar</option>
                        <option value="Matemáticas">Matemáticas</option>
                        <option value="Comunicación">Comunicación</option>
                        <option value="Ciencias">Ciencias</option>
                        <option value="Historia">Historia</option>
                        <option value="Arte">Arte</option>
                        <option value="Educación Física">Educación Física</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelEditUser">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal: Confirmar desactivación -->
<div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal-container confirm-modal">
        <div class="modal-header">
            <h3 id="confirmTitle">Confirmar acción</h3>
            <button class="modal-close" id="closeConfirmModal">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage">¿Estás seguro de que deseas realizar esta acción?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelConfirm">Cancelar</button>
                <button class="btn btn-danger" id="confirmActionBtn">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script src="public/assets/scripts/director/director-users.js"></script>
